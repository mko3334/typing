    <path d="M24 36 Q34 44 44 36" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
    <path d="M4 62 L18 48 M64 62 L50 48" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
